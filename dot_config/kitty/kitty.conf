# kitty.conf — shared across Linux (Arch/Hyprland) and macOS
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Window
window_padding_width 8
confirm_os_window_close 0

# URLs
url_style curly
detect_urls yes

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted

# macOS (ignored on Linux)
macos_option_as_alt yes

# Tokyo Night (night variant, from folke/tokyonight.nvim)
background #1a1b26
foreground #c0caf5

cursor            #c0caf5
cursor_text_color #1a1b26

selection_background #283457
selection_foreground #c0caf5

url_color #73daca

active_tab_background   #7aa2f7
active_tab_foreground   #16161e
inactive_tab_background #292e42
inactive_tab_foreground #545c7e

active_border_color   #7aa2f7
inactive_border_color #27a1b9

# black
color0 #15161e
color8 #414868

# red
color1 #f7768e
color9 #f7768e

# green
color2  #9ece6a
color10 #9ece6a

# yellow
color3  #e0af68
color11 #e0af68

# blue
color4  #7aa2f7
color12 #7aa2f7

# magenta
color5  #bb9af7
color13 #bb9af7

# cyan
color6  #7dcfff
color14 #7dcfff

# white
color7  #a9b1d6
color15 #c0caf5
